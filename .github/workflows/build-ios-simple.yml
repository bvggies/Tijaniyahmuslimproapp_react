name: Build iOS IPA (Simple & Working)

on:
  workflow_dispatch: # Manual trigger only

jobs:
  build-ios-ipa:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Install dependencies
      run: |
        npm ci
        npx expo install --fix
        
    - name: Clean previous builds
      run: |
        rm -rf ios
        rm -rf .expo
        rm -rf node_modules/.cache
        
    - name: Prebuild iOS project
      run: |
        npx expo prebuild --platform ios --clear --no-install
        
    - name: Install iOS dependencies
      run: |
        cd ios
        pod install --repo-update
        
    - name: Debug iOS project structure
      run: |
        cd ios
        echo "=== iOS Project Structure ==="
        ls -la
        echo ""
        echo "=== Looking for workspace ==="
        find . -name "*.xcworkspace" -o -name "*.xcodeproj"
        echo ""
        echo "=== Checking Pods ==="
        ls -la Pods/
        
    - name: Build iOS App
      run: |
        cd ios
        
        # Try to find the correct project file
        if [ -f "TijaniyahMuslimPro.xcworkspace" ]; then
          echo "✅ Building with workspace..."
          xcodebuild -workspace TijaniyahMuslimPro.xcworkspace \
                     -scheme TijaniyahMuslimPro \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath ./build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     build
        elif [ -f "TijaniyahMuslimPro.xcodeproj" ]; then
          echo "✅ Building with project..."
          xcodebuild -project TijaniyahMuslimPro.xcodeproj \
                     -scheme TijaniyahMuslimPro \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath ./build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     build
        else
          echo "❌ No iOS project found!"
          echo "Available files:"
          ls -la
          exit 1
        fi
        
    - name: Find built app
      run: |
        cd ios
        echo "=== Looking for built app ==="
        find build -name "*.app" -type d
        echo ""
        echo "=== Build directory contents ==="
        find build -type f -name "*.app" | head -10
        
    - name: Create IPA file
      run: |
        cd ios
        
        # Find the built app
        APP_PATH=$(find build -name "*.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ No app bundle found!"
          echo "Build directory contents:"
          find build -type f | head -20
          exit 1
        fi
        
        echo "✅ Found app at: $APP_PATH"
        
        # Create Payload directory
        mkdir -p Payload
        
        # Copy the app to Payload
        cp -r "$APP_PATH" Payload/
        
        # Create IPA
        zip -r TijaniyahPro.ipa Payload/
        
        echo "✅ IPA created successfully!"
        ls -la *.ipa
        
    - name: Upload iOS IPA
      uses: actions/upload-artifact@v4
      with:
        name: tijaniyah-pro-ios-ipa
        path: ios/TijaniyahPro.ipa
        retention-days: 30
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ios/TijaniyahPro.ipa
        tag_name: ios-v1.0.0
        name: Tijaniyah Muslim Pro iOS v1.0.0
        body: |
          🍎 **Tijaniyah Muslim Pro iOS Build**
          
          ## Features
          - ✅ Prayer Times with Location Detection
          - ✅ Qibla Compass with Sensors  
          - ✅ Islamic Calendar (Hijri Dates)
          - ✅ Azan Audio Player
          - ✅ Digital Tasbih
          - ✅ Islamic Lessons & Resources
          - ✅ Community Features
          - ✅ Donation System
          - ✅ Multi-language Support
          - ✅ Tijani Practices with Niyyah Supplications
          
          ## Installation
          This is a development build that can be installed via:
          - Xcode
          - Apple Configurator
          - Third-party app installers
          
          ## Ready for App Store! 🚀
        draft: false
        prerelease: true